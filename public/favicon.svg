           C 20 10, 12 18, 12 30
           C 12 36, 14 40, 18 43
           L 18 48
           C 18 50, 20 51, 22 51
           L 26 51
           L 26 47
           L 30 47
           L 30 51
           L 34 51
           L 34 47
           L 38 47
           L 38 51
           L 42 51
           C 44 51, 46 50, 46 48
           L 46 43
           C 50 40, 52 36, 52 30
           C 52 18, 44 10, 32 10 Z"
        fill="#ffffff"/>

  <!-- Eye sockets -->
  <circle cx="24" cy="28" r="4" fill="#0a0a0a"/>
  <circle cx="40" cy="28" r="4" fill="#0a0a0a"/>

